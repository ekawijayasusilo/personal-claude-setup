# ce-code-review full repro, but the model runs through DeepSeek's DIRECT API
# (platform.deepseek.com), NOT the opencode-go gateway — testing whether direct
# provider gives faster inference. Drop in ANY repo you own at
# .github/workflows/opencode-fullrepro-dsdirect.yml, commit to the default
# branch, run manually. Delete when done.
#
# REQUIRES a new repo secret: DEEPSEEK_API_KEY  (create one at
# https://platform.deepseek.com/ -> API keys). The old OPENCODE_API_KEY is for
# the opencode-go gateway and is NOT used for the direct provider.
#
# ⚠️ MODEL ID: DeepSeek's public API historically exposes `deepseek-chat` and
# `deepseek-reasoner`. Confirm the exact id for "V4 Flash" in the DeepSeek
# dashboard/model list and adjust `deepseek-v4-flash` below if it differs.

name: opencode-fullrepro-dsdirect

on:
  workflow_dispatch:

concurrency:
  group: opencode-fullrepro-dsdirect-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fullrepro:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Direct DeepSeek provider (OpenAI-compatible) + the CE plugin. The
      # provider block registers `deepseek/deepseek-v4-flash`; apiKey is read
      # from the DEEPSEEK_API_KEY env via opencode's {env:...} interpolation.
      OPENCODE_CONFIG_CONTENT: |
        {
          "provider": {
            "deepseek": {
              "npm": "@ai-sdk/openai-compatible",
              "name": "DeepSeek Direct",
              "options": {
                "baseURL": "https://api.deepseek.com/v1",
                "apiKey": "{env:DEEPSEEK_API_KEY}"
              },
              "models": {
                "deepseek-v4-flash": { "name": "DeepSeek V4 Flash" }
              }
            }
          },
          "plugin": ["compound-engineering@git+https://github.com/EveryInc/compound-engineering-plugin.git"]
        }
      OPENCODE_LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install opencode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Fabricate a buggy diff to review
        run: |
          git config user.email "probe@example.com"
          git config user.name "probe"

          mkdir -p probe_src

          cat > probe_src/session_auth.py <<'BASE_EOF'
          def make_token(user_id):
              return f"tok-{user_id}"
          BASE_EOF
          git add probe_src/session_auth.py
          git commit -q -m "probe: baseline"

          cat > probe_src/session_auth.py <<'CHANGE_EOF'
          import time
          import sqlite3

          SECRET = "hardcoded-signing-key-do-not-ship"   # smell: hardcoded secret
          SESSION_TTL = 3600

          def make_token(user_id):
              return f"tok-{user_id}-{int(time.time())}"

          def is_expired(issued_at, now):
              # bug: should be >= ; off-by-one lets an expired token through at the boundary
              return now - issued_at > SESSION_TTL

          def lookup_user(db, username):
              # bug: SQL injection via string interpolation
              cur = db.cursor()
              cur.execute(f"SELECT id, role FROM users WHERE name = '{username}'")
              return cur.fetchone()

          def authorize(db, username, token, issued_at, now):
              user = lookup_user(db, username)
              # bug: no None check; NoneType subscript when user is missing
              role = user[1]
              if is_expired(issued_at, now):
                  return None
              return {"user_id": user[0], "role": role, "token": token}
          CHANGE_EOF
          git add probe_src/session_auth.py
          git commit -q -m "probe: add session auth (buggy)"

          echo "=== diff under review (HEAD~1..HEAD) ==="
          git diff HEAD~1..HEAD

      - name: Write repro prompt
        run: |
          cat > "$RUNNER_TEMP/repro.md" <<'PROMPT_EOF'
          You are testing the ce-code-review skill END TO END. Do NOT review the
          diff yourself. You MUST invoke the `ce-code-review` skill via the skill
          tool in mode:agent and let its FULL pipeline run to completion: scope
          determination, reviewer selection, reviewer DISPATCH as subagents,
          synthesis, and the findings report.

          Do not modify files, do not commit, do not push, do not post comments.

          Target diff: the most recent commit, range HEAD~1..HEAD, in the current
          repository. Inspect it with `git diff HEAD~1..HEAD`.

          Hard requirements:
          - Actually CALL the skill tool for `ce-code-review`. Do not paraphrase,
            summarize, or emulate its stages in the main thread.
          - Let the skill DISPATCH its reviewer personas as subagents (its
            dispatch protocol spawns generic subagents with a persona injected).
            Do not collapse the reviewers into the main thread.
          - Do NOT self-declare "degraded" and fall back to a manual review. If —
            and only if — the skill tool returns an actual error, quote that error
            verbatim and stop.

          Final output, in this order:
          1. The skill's findings report.
          2. A section titled DISPATCH_TRACE stating: how many reviewer subagents
             you actually dispatched, each subagent's persona/role, and the exact
             subagent_type you passed to the task tool for each. If you dispatched
             ZERO subagents, say so plainly and explain why.
          PROMPT_EOF
          echo "=== repro.md ===" && cat "$RUNNER_TEMP/repro.md"

      - name: Run ce-code-review end-to-end (direct DeepSeek, DEBUG log)
        run: |
          echo "=== confirm the model is registered ==="
          opencode models 2>/dev/null | grep -i deepseek || echo "(no deepseek models listed — check provider config / model id)"
          echo "=== run ==="
          opencode run --log-level DEBUG --model deepseek/deepseek-v4-flash \
            "$(cat "$RUNNER_TEMP/repro.md")" 2>&1 | tee "$RUNNER_TEMP/run.log" || true

      - name: Analyze fan-out + timing
        run: |
          LOG="$RUNNER_TEMP/run.log"
          echo "======================================================"
          echo " FAN-OUT + PROVIDER ANALYSIS"
          echo "======================================================"

          echo "--- (0) which provider/model actually served ---"
          grep -nE 'deepseek|provider|baseURL|api.deepseek.com|opencode-go' "$LOG" || echo "  (none matched)"

          echo "--- (1) skill invocation ---"
          grep -nE 'ce-code-review|Skill "ce-code-review"' "$LOG" || echo "  (none matched)"

          echo "--- (2) reviewer subagent dispatches ---"
          grep -nE '• .*Agent|✓ .*Agent|subagent_type|Unknown agent type' "$LOG" || echo "  (none matched)"

          echo "--- (3) DISPATCH_TRACE from the agent's own report ---"
          grep -nA 20 'DISPATCH_TRACE' "$LOG" || echo "  (no DISPATCH_TRACE printed)"

          echo "--- (4) auth / provider errors ---"
          grep -nE 'error|Error|401|403|unauthorized|invalid api key|canceled|timed out' "$LOG" || echo "  (none matched)"

          echo "------------------------------------------------------"
          echo " Compare wall-clock of the run step vs the opencode-go run."
          echo " If it still cancels at 25 min => model speed is the ceiling,"
          echo " not the gateway. If it finishes => direct provider is faster."
          echo "======================================================"
