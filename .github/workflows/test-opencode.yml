# Throwaway END-TO-END repro. Drop in ANY repo you own (a dummy repo is ideal)
# at .github/workflows/opencode-fullrepro.yml, commit to the default branch,
# then run manually from the Actions tab. Delete when done.
#
# Question it answers: when ce-code-review actually RUNS to completion, does it
# fan out into reviewer SUBAGENTS (Stage 4 dispatch), or does it collapse to a
# single main-thread review (CE #799/#1099)?
#
# It is fully self-contained: it fabricates its own buggy diff in the runner
# workspace, so it does NOT need a real PR, android_template, or any repo
# contents. Runs raw `opencode run --log-level DEBUG` and then greps the
# captured log for actual subagent dispatches.

name: opencode-fullrepro

on:
  workflow_dispatch:

concurrency:
  group: opencode-fullrepro-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fullrepro:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENCODE_CONFIG_CONTENT: |
        {
          "plugin": ["compound-engineering@git+https://github.com/EveryInc/compound-engineering-plugin.git"]
        }
      OPENCODE_LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install opencode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      # Fabricate a real, COMPLEX-looking diff with genuine bugs so Stage 3
      # selects multiple reviewer personas (correctness + security) and there is
      # a real reason to fan out. Two local commits => HEAD~1..HEAD is the change.
      - name: Fabricate a buggy diff to review
        run: |
          git config user.email "probe@example.com"
          git config user.name "probe"

          mkdir -p probe_src

          # --- baseline commit ---
          cat > probe_src/session_auth.py <<'BASE_EOF'
          def make_token(user_id):
              return f"tok-{user_id}"
          BASE_EOF
          git add probe_src/session_auth.py
          git commit -q -m "probe: baseline"

          # --- the change under review (deliberately buggy) ---
          cat > probe_src/session_auth.py <<'CHANGE_EOF'
          import time
          import sqlite3

          SECRET = "hardcoded-signing-key-do-not-ship"   # smell: hardcoded secret
          SESSION_TTL = 3600

          def make_token(user_id):
              return f"tok-{user_id}-{int(time.time())}"

          def is_expired(issued_at, now):
              # bug: should be >= ; off-by-one lets an expired token through at the boundary
              return now - issued_at > SESSION_TTL

          def lookup_user(db, username):
              # bug: SQL injection via string interpolation
              cur = db.cursor()
              cur.execute(f"SELECT id, role FROM users WHERE name = '{username}'")
              return cur.fetchone()

          def authorize(db, username, token, issued_at, now):
              user = lookup_user(db, username)
              # bug: no None check; NoneType subscript when user is missing
              role = user[1]
              if is_expired(issued_at, now):
                  return None
              return {"user_id": user[0], "role": role, "token": token}
          CHANGE_EOF
          git add probe_src/session_auth.py
          git commit -q -m "probe: add session auth (buggy)"

          echo "=== diff under review (HEAD~1..HEAD) ==="
          git diff HEAD~1..HEAD

      - name: Write repro prompt
        run: |
          cat > "$RUNNER_TEMP/repro.md" <<'PROMPT_EOF'
          You are testing the ce-code-review skill END TO END. Do NOT review the
          diff yourself. You MUST invoke the `ce-code-review` skill via the skill
          tool in mode:agent and let its FULL pipeline run to completion: scope
          determination, reviewer selection, reviewer DISPATCH as subagents,
          synthesis, and the findings report.

          Do not modify files, do not commit, do not push, do not post comments.

          Target diff: the most recent commit, range HEAD~1..HEAD, in the current
          repository. Inspect it with `git diff HEAD~1..HEAD`.

          Hard requirements:
          - Actually CALL the skill tool for `ce-code-review`. Do not paraphrase,
            summarize, or emulate its stages in the main thread.
          - Let the skill DISPATCH its reviewer personas as subagents (its
            dispatch protocol spawns generic subagents with a persona injected).
            Do not collapse the reviewers into the main thread.
          - Do NOT self-declare "degraded" and fall back to a manual review. If —
            and only if — the skill tool returns an actual error, quote that error
            verbatim and stop.

          Final output, in this order:
          1. The skill's findings report.
          2. A section titled DISPATCH_TRACE stating: how many reviewer subagents
             you actually dispatched, each subagent's persona/role, and the exact
             subagent_type you passed to the task tool for each. If you dispatched
             ZERO subagents, say so plainly and explain why.
          PROMPT_EOF
          echo "=== repro.md ===" && cat "$RUNNER_TEMP/repro.md"

      - name: Run ce-code-review end-to-end (DEBUG log, captured)
        run: |
          # Tee everything so the next step can analyze it even if opencode exits
          # nonzero. Model matches production.
          opencode run --log-level DEBUG --model opencode-go/deepseek-v4-pro \
            "$(cat "$RUNNER_TEMP/repro.md")" 2>&1 | tee "$RUNNER_TEMP/run.log" || true

      - name: Analyze fan-out (did reviewer subagents actually spawn?)
        run: |
          LOG="$RUNNER_TEMP/run.log"
          echo "======================================================"
          echo " FAN-OUT ANALYSIS"
          echo "======================================================"

          echo "--- (1) task tool invocations (subagent dispatches) ---"
          grep -nE '"tool":[[:space:]]*"task"|subagent_type|\btask\b.*subagent|Task tool' "$LOG" || echo "  (none matched)"

          echo "--- (2) subagent session/agent markers ---"
          # Child reviewer subagents surface as agent stream lines and dispatch bullets.
          grep -nE 'agent:[[:space:]]*"(general|explore)"|• .*Agent|✓ .*Agent|Unknown agent type' "$LOG" || echo "  (none matched)"

          echo "--- (3) skill tool invocation for ce-code-review ---"
          grep -nE 'ce-code-review|"tool":[[:space:]]*"skill"|\bskill\b tool|Skill' "$LOG" || echo "  (none matched)"

          echo "--- (4) DISPATCH_TRACE section from the agent's own report ---"
          grep -nA 20 'DISPATCH_TRACE' "$LOG" || echo "  (no DISPATCH_TRACE printed)"

          echo "------------------------------------------------------"
          DISPATCHES=$(grep -cE '"tool":[[:space:]]*"task"|• .*Agent' "$LOG" || true)
          echo " Rough subagent-dispatch line count: ${DISPATCHES}"
          echo " Read the full step log above for the definitive trace."
          echo "   0 dispatches  => COLLAPSED to main thread (behavioral fix needed)"
          echo "   N dispatches  => FANS OUT (pipeline works end-to-end)"
          echo "======================================================"
